```html
<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Money Pro Bank</title>

<link rel="manifest" href="manifest.json">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<!-- TOP BAR -->
<header class="topbar">

<div class="logo">
<i class="fa-solid fa-wallet"></i>
<span>Money Pro</span>
</div>

<div class="top-actions">

<button onclick="toggleLang()" id="langBtn">
EN
</button>

</div>

</header>

<!-- DASHBOARD -->
<section class="dashboard">

<div class="card main-card">
<h3>الرصيد الحالي</h3>
<p id="totalMoney">0 ر.س</p>
</div>

<div class="grid">

<div class="card">
<h4>الدخل</h4>
<p id="totalIncome">0</p>
</div>

<div class="card">
<h4>المصروفات</h4>
<p id="totalExpenses">0</p>
</div>

<div class="card">
<h4>الادخار</h4>
<p id="totalSavings">0</p>
</div>

<div class="card">
<h4>الأمانات</h4>
<p id="totalTrusts">0</p>
</div>

</div>

</section>

<!-- NAVIGATION -->
<nav class="bottom-nav">

<button onclick="showTab('home')"><i class="fa fa-home"></i></button>

<button onclick="showTab('income')"><i class="fa fa-arrow-up"></i></button>

<button onclick="showTab('expense')"><i class="fa fa-arrow-down"></i></button>

<button onclick="showTab('people')"><i class="fa fa-users"></i></button>

<button onclick="showTab('more')"><i class="fa fa-bars"></i></button>

</nav>

<!-- INCOME -->
<section id="income" class="tab">

<h2>الدخل</h2>

<input id="incomeTitle" placeholder="الوصف">
<input id="incomeAmount" type="number" placeholder="المبلغ">
<button onclick="addIncome()">إضافة</button>

<div id="incomeList"></div>

</section>

<!-- EXPENSE -->
<section id="expense" class="tab">

<h2>المصروفات</h2>

<input id="expenseTitle" placeholder="الوصف">
<input id="expenseAmount" type="number">
<button onclick="addExpense()">إضافة</button>

<div id="expenseList"></div>

</section>

<!-- PEOPLE -->
<section id="people" class="tab">

<h2>الأشخاص</h2>

<input id="personName" placeholder="الاسم">
<input id="personBalance" type="number">
<button onclick="addPerson()">إضافة</button>

<div id="peopleList"></div>

</section>

<!-- MORE -->
<section id="more" class="tab">

<h2>المزيد</h2>

<button onclick="exportData()">تصدير البيانات</button>

<input type="file" onchange="importData(event)">

<button onclick="resetApp()">إعادة ضبط</button>

<div id="goalsList"></div>

<div id="trustList"></div>

</section>

<!-- CHART -->
<section class="chart-box">

<canvas id="incomeExpenseChart"></canvas>

</section>

<script src="js/storage.js"></script>
<script src="js/language.js"></script>
<script src="js/app.js"></script>
<script src="js/income.js"></script>
<script src="js/expenses.js"></script>
<script src="js/people.js"></script>
<script src="js/savings.js"></script>
<script src="js/trusts.js"></script>
<script src="js/goals.js"></script>
<script src="js/charts.js"></script>
<script src="js/backup.js"></script>

</body>
</html>
```
