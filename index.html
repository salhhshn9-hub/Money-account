<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Money Account Pro</title><link rel="manifest" href="manifest.json"><link rel="stylesheet" href="css/style.css"><script src="https://cdn.jsdelivr.net/npm/chart.js"></script></head><body><header><h1>💰 Money Account Pro</h1></header><div class="grid"><div class="card"><h3>إجمالي الأموال</h3><p id="balance">0 ر.س</p></div><div class="card"><h3>الدخل</h3><p id="income">0 ر.س</p></div><div class="card"><h3>المصروفات</h3><p id="expense">0 ر.س</p></div></div><section class="card"><input id="title" placeholder="الوصف"><input id="amount" type="number" placeholder="المبلغ"><select id="type"><option value="income">دخل</option><option value="expense">مصروف</option></select><button id="addBtn">إضافة</button></section><section class="card"><ul id="list"></ul></section><section class="card"><canvas id="chart"></canvas></section><script src="js/app.js"></script></body></html>
